project: Linselab merge control
status: active
purpose: Record decisions to keep, split, merge, normalize, archive as source, or mark as duplicate.
rules:
  - Every decision must reference source_id or instrument_id.
  - Every merge must document preserved variance and risk of loss.
  - No decision may delete or overwrite original source files.
